apiVersion: batch/v1
kind: Job
metadata:
  name: customer-site-migrate-{{SHORT_SHA}}
  namespace: {{NAMESPACE}}
  labels:
    app: customer-site
    customer: "{{CUSTOMER_ID}}"
    component: migrate
spec:
  ttlSecondsAfterFinished: 300
  backoffLimit: 1
  template:
    metadata:
      labels:
        app: customer-site
        component: migrate
    spec:
      restartPolicy: Never
      containers:
        - name: migrate
          image: registry.scaleweb.dk/{{NAMESPACE}}-site:{{SHORT_SHA}}
          imagePullPolicy: Always
          command: ["npm", "run", "db:migrate"]

          env:
            - name: NODE_ENV
              value: "production"
            - name: DB_HOST
              value: "mariadb.rengoeringdk.svc.cluster.local"
            - name: DB_PORT
              value: "3306"
            - name: DB_USER
              value: "rengoeringdk_user"
            - name: DB_NAME
              value: "rengoeringdk_wp"
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: mariadb-secrets
                  key: PASSWORD
            - name: DB_SSL_CERT
              value: "/etc/ssl/mariadb-client/tls.crt"
            - name: DB_SSL_KEY
              value: "/etc/ssl/mariadb-client/tls.key"
            - name: DB_SSL_CA
              value: "/etc/ssl/mariadb-ca/ca.crt"

          volumeMounts:
            - name: mariadb-client-cert
              mountPath: /etc/ssl/mariadb-client
              readOnly: true
            - name: mariadb-ca
              mountPath: /etc/ssl/mariadb-ca
              readOnly: true

      volumes:
        - name: mariadb-client-cert
          secret:
            secretName: mariadb-client-cert
        - name: mariadb-ca
          secret:
            secretName: mariadb-ca-bundle

      imagePullSecrets:
        - name: registry-credentials

---
# Customer Site Deployment (React Router 7 SSR via Node.js)
#
# Serves the customer's public-facing website via server-side rendering.
# Fetches content from the WordPress WP-REST API.
# Each customer has a unique Docker image built from their forked repo.
#
apiVersion: apps/v1
kind: Deployment
metadata:
  name: customer-site
  namespace: {{NAMESPACE}}
  labels:
    app: customer-site
    customer: "{{CUSTOMER_ID}}"
spec:
  replicas: 1
  revisionHistoryLimit: 3
  selector:
    matchLabels:
      app: customer-site
      customer: "{{CUSTOMER_ID}}"

  template:
    metadata:
      labels:
        app: customer-site
        customer: "{{CUSTOMER_ID}}"
    spec:
      containers:
        - name: customer-site
          image: registry.scaleweb.dk/{{NAMESPACE}}-site:latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 3000
              protocol: TCP

          env:
            - name: NODE_ENV
              value: "production"
            - name: PORT
              value: "3000"
            - name: WP_API_URL
              value: "http://wordpress:80/wp-json"
            # Database
            - name: DB_HOST
              value: "mariadb.rengoeringdk.svc.cluster.local"
            - name: DB_PORT
              value: "3306"
            - name: DB_USER
              value: "rengoeringdk_user"
            - name: DB_NAME
              value: "rengoeringdk_wp"
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: mariadb-secrets
                  key: PASSWORD
            - name: DB_SSL_CERT
              value: "/etc/ssl/mariadb-client/tls.crt"
            - name: DB_SSL_KEY
              value: "/etc/ssl/mariadb-client/tls.key"
            - name: DB_SSL_CA
              value: "/etc/ssl/mariadb-ca/ca.crt"
            # Mail
            - name: SMTP_HOST
              value: "mailserver"
            - name: SMTP_PORT
              value: "587"
            - name: SMTP_USER
              valueFrom:
                secretKeyRef:
                  name: mail-secrets
                  key: relay-username
            - name: SMTP_PASS
              valueFrom:
                secretKeyRef:
                  name: mail-secrets
                  key: relay-password
            - name: MAIL_FROM
              value: "kontakt@rengoering.dk"
            - name: MAIL_TO
              value: "info@define-cleaning.dk"

          livenessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3

          readinessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3

          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi

          volumeMounts:
            - name: mariadb-client-cert
              mountPath: /etc/ssl/mariadb-client
              readOnly: true
            - name: mariadb-ca
              mountPath: /etc/ssl/mariadb-ca
              readOnly: true

      volumes:
        - name: mariadb-client-cert
          secret:
            secretName: mariadb-client-cert
        - name: mariadb-ca
          secret:
            secretName: mariadb-ca-bundle

      imagePullSecrets:
        - name: registry-credentials

  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0

---
apiVersion: v1
kind: Service
metadata:
  name: customer-site
  namespace: {{NAMESPACE}}
  labels:
    app: customer-site
    customer: "{{CUSTOMER_ID}}"
spec:
  type: ClusterIP
  ports:
    - port: 80
      targetPort: 3000
      protocol: TCP
  selector:
    app: customer-site
    customer: "{{CUSTOMER_ID}}"
